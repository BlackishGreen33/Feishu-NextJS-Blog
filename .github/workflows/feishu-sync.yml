name: ⏱️ Feishu Sync

on:
  workflow_dispatch: {}
  schedule:
    - cron: '2,12,22,32,42,52 * * * *'

concurrency:
  group: feishu-sync
  cancel-in-progress: true

jobs:
  sync:
    name: Trigger production sync
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🔁 Trigger sync endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SYNC_URL: https://blog.blackishgreen.dpdns.org/api/cron/feishu-sync
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is not configured in GitHub Actions secrets."
            exit 1
          fi

          curl \
            --silent \
            --show-error \
            --fail-with-body \
            --retry 2 \
            --retry-delay 5 \
            --retry-all-errors \
            --max-time 300 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SYNC_URL"
